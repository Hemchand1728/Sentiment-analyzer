{% extends 'layout.html' %}

{% block content %}

<!-- Notification Container -->
<div id="notification-banner" style="display: none; background: #dcfce7; color: #166534; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bbf7d0; text-align: center; font-weight: 500; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); position: relative;">
    Your feedback has been resolved ✅
    <span onclick="document.getElementById('notification-banner').remove()" 
          style="position:absolute; right:12px; top:8px; cursor:pointer; font-weight:bold;">×</span>
</div>

<div class="card wide">
    <h2>Your Sentiment History</h2>

    <div class="saas-stats-grid">
        <div class="saas-stat-card saas-stat-positive">
            <div class="saas-stat-header">
                <span class="stat-icon">🟢</span>
                Positive
            </div>
            <div id="positive-count" class="saas-stat-value">0</div>
        </div>
        <div class="saas-stat-card saas-stat-negative">
            <div class="saas-stat-header">
                <span class="stat-icon">🔴</span>
                Negative
            </div>
            <div id="negative-count" class="saas-stat-value">0</div>
        </div>
        <div class="saas-stat-card saas-stat-neutral">
            <div class="saas-stat-header">
                <span class="stat-icon">⚪</span>
                Neutral
            </div>
            <div id="neutral-count" class="saas-stat-value">0</div>
        </div>
    </div>

    <div class="admin-card" style="max-width: 520px; margin: 30px auto;">
        <h3 style="text-align: center; margin-top: 0;">Sentiment Distribution</h3>
        <canvas id="sentimentChart"></canvas>
    </div>

    <div class="history-section">
        <div id="keywords-grid" class="keywords-grid"></div>
        <div id="no-history-msg" style="display: none; text-align: center; padding: 40px 20px; color: #6b7280; font-weight: 500;">
            No analysis yet. Start by searching a keyword.
        </div>
    </div>
    
    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #e5e7eb;">
    
    <div class="feedback-section" style="max-width: 800px; margin: 0 auto; text-align: left;">
        <h3 style="margin-bottom: 20px; font-weight: 600; font-size: 1.25rem;">My Feedback</h3>
        <div id="my-feedback-list" style="margin-bottom: 40px;">
            <!-- Feedback populated by JS -->
            <div style="color: #6b7280; font-size: 0.9rem;">Loading feedback...</div>
        </div>

        <h3 style="margin-bottom: 20px; font-weight: 600; font-size: 1.25rem;">Submit New Feedback</h3>
        <form id="user-feedback-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 600px;">
            <select id="feedback-type" class="form-control" required style="border-radius: 8px; background: #fff; color: #111827;">
                <option value="Suggestion">Suggestion</option>
                <option value="Bug">Bug Report</option>
                <option value="UI Issue">UI Issue</option>
            </select>
            <textarea id="feedback-message" class="form-control" required rows="4" placeholder="How can we improve the system?" style="border-radius: 8px; margin-bottom: 10px; background: #fff; color: #111827;"></textarea>
            <button type="submit" class="btn" style="width: 100%;">Submit Feedback</button>
            <div id="feedback-alert" class="text-center" style="margin-top: 10px;"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="application/json" id="history-data">
{{ data | tojson | safe }}
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var dataScript = document.getElementById('history-data');
        try {
            window.historyData = JSON.parse(dataScript.textContent || dataScript.innerText) || [];
        } catch (e) {
            window.historyData = [];
        }

        if (!window.historyData || window.historyData.length === 0) {
            document.getElementById('no-history-msg').style.display = 'block';
            var gridObj = document.getElementById('keywords-grid');
            if (gridObj) gridObj.style.display = 'none';
        }
    });
</script>

<script>
    // Detect back navigation and force reload to refresh states
    window.addEventListener("pageshow", function (event) {
        if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
            window.location.reload();
        }
    });

    // Check session validity
    fetch('/check-session', {
        credentials: 'same-origin'
    })
    .then(res => res.json())
    .then(data => {
        if (!data.logged_in) {
            window.location.href = '/login';
        }
    });
</script>

<script>
    document.getElementById('user-feedback-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fType = document.getElementById('feedback-type').value;
        const msg = document.getElementById('feedback-message').value;
        const alertBox = document.getElementById('feedback-alert');
        const btn = e.target.querySelector('button');
        
        btn.disabled = true;
        btn.textContent = 'Submitting...';
        
        try {
            const res = await fetch('/submit-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: fType, message: msg })
            });
            const data = await res.json();
            
            if (data.success) {
                alertBox.innerHTML = '<span class="badge positive">Feedback submitted successfully!</span>';
                document.getElementById('feedback-message').value = '';
            } else {
                alertBox.innerHTML = '<span class="badge negative">' + (data.error || 'Failed to submit') + '</span>';
            }
        } catch (err) {
            alertBox.innerHTML = '<span class="badge negative">Network error. Try again.</span>';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit Feedback';
            setTimeout(() => { alertBox.innerHTML = ''; }, 3000);
        }
        
    });
</script>

<script src="/static/dashboard.js"></script>

<script>
    // Show notification and auto-hide after 5 seconds
    document.addEventListener("DOMContentLoaded", function() {
        const banner = document.getElementById("notification-banner");

        if (banner && banner.innerText.trim() !== "") {
            banner.style.display = "block";

            setTimeout(() => {
                banner.style.opacity = "0";
                setTimeout(() => {
                    if (banner) banner.remove();
                }, 500);
            }, 5000);
        }
    });
</script>

{% endblock %}
