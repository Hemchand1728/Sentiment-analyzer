{% extends 'layout.html' %}

{% block content %}

<div class="card wide">
    <h2>Your Sentiment History</h2>

    <div class="summary-cards">
        <div class="summary-card sg-total">
            <div class="summary-card-title">Total Analyzed</div>
            <div id="total-count" class="summary-card-value">0</div>
        </div>
        <div class="summary-card sg-positive">
            <div class="summary-card-title">Positive</div>
            <div id="positive-count" class="summary-card-value">0</div>
        </div>
        <div class="summary-card sg-negative">
            <div class="summary-card-title">Negative</div>
            <div id="negative-count" class="summary-card-value">0</div>
        </div>
        <div class="summary-card sg-neutral">
            <div class="summary-card-title">Neutral</div>
            <div id="neutral-count" class="summary-card-value">0</div>
        </div>
    </div>

    <div class="admin-card" style="max-width: 520px; margin: 30px auto;">
        <h3 style="text-align: center; margin-top: 0;">Sentiment Distribution</h3>
        <canvas id="sentimentChart"></canvas>
    </div>

    <div class="history-section">
        <table class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Text</th>
                    <th>Sentiment</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
        <div id="no-history-msg" style="display: none; text-align: center; padding: 20px; color: rgba(224, 231, 255, 0.85);">
            No history found. Try analyzing some text!
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="application/json" id="history-data">
{{ data | tojson | safe }}
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var dataScript = document.getElementById('history-data');
        try {
            window.historyData = JSON.parse(dataScript.textContent || dataScript.innerText) || [];
        } catch (e) {
            window.historyData = [];
        }

        if (!window.historyData || window.historyData.length === 0) {
            document.getElementById('no-history-msg').style.display = 'block';
            var table = document.querySelector('.history-table');
            if (table) table.style.display = 'none';
        }
    });
</script>

<script>
    // Detect back navigation and force redirect
    window.addEventListener("pageshow", function (event) {
        if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
            window.location.href = "/login";
        }
    });

    // Check session validity
    fetch('/check-session', {
        credentials: 'same-origin'
    })
    .then(res => res.json())
    .then(data => {
        if (!data.logged_in) {
            window.location.href = '/login';
        }
    });
</script>

<script src="/static/dashboard.js"></script>

{% endblock %}
