{% extends 'layout.html' %}

{% block content %}
<div class="auth-shell">
    <div class="auth-hero">
        <h1 class="auth-title">Admin Access</h1>
        <p class="auth-subtitle">Sign in to manage comments, moderate content, and block users.</p>
    </div>

    <div class="card auth-card">
        <h2 style="margin-bottom: 1.25rem;">Admin Login</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin-login">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" placeholder="Enter admin username" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password" required />
            </div>

            <button type="submit" class="btn btn-gradient">Sign In</button>
        </form>

        <p class="text-center text-muted mt-3">
            Not an admin? <a href="{{ url_for('login') }}" class="auth-link">Go to user login</a>
        </p>
    </div>
</div>
{% endblock %}
