{% extends 'layout.html' %}
{% block title %}Register - Sentiment Analyzer{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
    <div class="auth-hero">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Join to analyze sentiment effortlessly.</p>
    </div>

    <div class="auth-card">
        <h2 style="margin-bottom: 1.25rem;">Register</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Choose a username" required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required />
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Create a strong password" required />
            </div>

            <button type="submit" class="btn btn-gradient" style="width: 100%;">Register</button>
        </form>

        <p class="text-center mt-3 text-muted">
            Already have an account? <a href="{{ url_for('login') }}" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
