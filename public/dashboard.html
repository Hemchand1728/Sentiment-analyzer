<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Sentiment Analysis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="dashboard-header">
      <h2>User Dashboard</h2>
      <button onclick="handleLogout()" class="btn btn-outline" style="min-width:auto; padding: 0.5rem 1rem;">Logout</button>
    </div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <h3 style="margin-top:0;">Analyze Text</h3>
      <div class="form-group">
        <textarea id="analyzeBox" class="form-control" placeholder="Type a sentence (e.g. 'I am feeling very happy today' or 'I hate this weather')..."></textarea>
      </div>
      <button onclick="analyzeText()" class="btn btn-primary">Analyze Sentiment</button>

      <div id="resultBox" class="result-box" style="display:none;"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const token = checkAuth('user'); // Also allow admins actually

    async function analyzeText() {
      const text = document.getElementById('analyzeBox').value;
      if (!text) return alert("Please enter text");

      const tkn = localStorage.getItem('token');
      try {
        const res = await fetch('/api/sentiment/analyze', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${tkn}`
          },
          body: JSON.stringify({ text })
        });

        const data = await res.json();
        if (res.ok) {
          const resBox = document.getElementById('resultBox');
          resBox.style.display = 'block';
          
          resBox.className = 'result-box';
          if (data.sentiment === 'Positive') resBox.classList.add('res-positive');
          else if (data.sentiment === 'Negative') resBox.classList.add('res-negative');
          else resBox.classList.add('res-neutral');

          resBox.innerText = `Sentiment: ${data.sentiment}`;
        } else {
          alert('Error: ' + data.error);
        }
      } catch (e) {
        alert("Network error.");
      }
    }
  </script>
</body>
</html>
