<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Sentiment Analysis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <h2>Create an Account</h2>
      <div id="alertMsg" class="alert"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        if (!res.ok) {
          showMessage('error', data.error || 'Server error');
        } else {
          showMessage('success', 'Registration successful! Redirecting...');
          setTimeout(() => window.location.href = '/login.html', 1500);
        }
      } catch (err) {
        showMessage('error', 'Network error');
      }
    });
  </script>
</body>
</html>
