<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Sentiment Analysis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <div id="alertMsg" class="alert"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = await handleAuth('/api/auth/login', { email, password });
      if (res) {
        if (res.role === 'admin') window.location.href = '/admin-dashboard.html';
        else window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
