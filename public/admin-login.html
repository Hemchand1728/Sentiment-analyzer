<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Sentiment Analysis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="auth-card" style="border-top: 4px solid var(--danger);">
      <h2>Admin Portal</h2>
      <div id="alertMsg" class="alert"></div>
      
      <form id="adminForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark btn-block">Enter Portal</button>
      </form>
      <div style="text-align: center; margin-top: 1rem;">
        <a href="/" style="font-size: 0.875rem;">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = await handleAuth('/api/auth/admin-login', { email, password });
      if (res && res.role === 'admin') {
        window.location.href = '/admin-dashboard.html';
      }
    });
  </script>
</body>
</html>
